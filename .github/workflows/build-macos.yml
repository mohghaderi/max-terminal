name: Build macOS Executable

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v0.1.0-macos)'
        required: true
      release_name:
        description: 'Release name shown on GitHub'
        required: false
        default: 'macOS build'
      build_command:
        description: 'Command that produces the executable(s)'
        required: false
        default: 'npm run dist'
      artifact_glob:
        description: 'Glob for build outputs to upload to the release'
        required: false
        default: 'dist/**/*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.13.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ inputs.build_command }}

      - name: Create release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          files: ${{ inputs.artifact_glob }}
